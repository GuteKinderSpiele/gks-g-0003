name: Deploy to GitHub Pages

# Builds the standalone game and publishes the static dist/ to GitHub Pages.
# The game is pure client-side Phaser, so the Vite build is fully static.
# vite.config.js sets `base: './'`, so it works at a project-site sub-path
# (https://<user>.github.io/gks-g-0003/).
#
# The SDK (@gks/sdk) is a PUBLIC GitHub dependency, so `npm install` fetches it
# anonymously — no token, secret, or auth step needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # npm pins GitHub git-deps as git+ssh:// in the lockfile. The SDK is public,
      # so rewrite GitHub SSH URLs to anonymous HTTPS — keyless, no token/SSH key.
      - name: Use anonymous HTTPS for GitHub git deps
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & build
        run: |
          npm install
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
